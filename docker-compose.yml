version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - JWT_SECRET=super-secret-cargo-key-10928
      - DB_TYPE=sqlite  # Change to 'mysql' to use the MySQL container
      - MYSQL_HOST=db
      - MYSQL_USER=cargo_user
      - MYSQL_PASSWORD=cargo_secure_pass
      - MYSQL_DATABASE=cargo_theft_fraud_db
      - MYSQL_PORT=3306
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - db

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_secure_pass
      - MYSQL_DATABASE=cargo_theft_fraud_db
      - MYSQL_USER=cargo_user
      - MYSQL_PASSWORD=cargo_secure_pass
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
